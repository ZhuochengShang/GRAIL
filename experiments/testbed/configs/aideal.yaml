# AIDEAL config for the BARE TESTBED.
# barelib starts with NOTHING: no LLM readme, no aliases, no notes, no error
# log, no tasks, no project profile. Build each asset up one stage at a time
# and measure (see testbed/README.md for the protocol).

project:
  name: barelib
  language: Python

codebase:
  source_globs:
    - "barelib/**/*.py"
  public_def_regex: "def\\s+([a-z][a-z0-9_]*)"
  exclude_names: []

files:
  project_profile: configs/project_profile.yaml   # stage 0: `aideal.cli init`
  prompts_dir: prompts
  llm_readme: docs/LLM_readme.md                  # stage 2: `readme --generate`
  notes_to_self: docs/notes_to_self.md            # stage 5: distilled from errors
  integration_tasks: configs/integration_tasks.yaml
  aliases: aliases/aliases.json                   # stage 4
  error_log: logs/error_log.jsonl                 # stage 5

models:
  registry:
    gpt-4o:        { provider: openai,    model: gpt-4o }
    gpt-4o-mini:   { provider: openai,    model: gpt-4o-mini }
    claude-sonnet: { provider: anthropic, model: claude-sonnet-4-6 }
    qwen:          { provider: ollama,    model: qwen3:32b }
    llama3:        { provider: ollama,    model: llama3 }
  roles:
    author: gpt-4o-mini
    audience: gpt-4o

runtime:
  target: local
  local: {}        # pure Python - no spark, no conda env needed

checks:
  required_sections:
    - "Goal"
    - "Valid Call Patterns|Valid Access Patterns"
    - "LLM Instruction Prompt"
    - "Prompt Snippet"
    - "Common Failure Modes"
    - "Fix Code Hint"
  comprehension_apis_sampled: 5

puzzle:
  cwd: .
  command: "python runner/puzzle_runner.py --api-doc {llm_readme} --num-puzzles {n} --num-functions {k} --seed {seed}"
  num_puzzles: 5
  num_functions: 4
  seed: 42
  max_fix_rounds: 2
