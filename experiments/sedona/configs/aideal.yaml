# Experiment target 2: Apache Sedona — external codebase, original readme.
# SETUP (you input later):
#   cd experiments/sedona
#   git clone --depth 1 https://github.com/apache/sedona
# The Python API is targeted because generated code can be EXECUTED locally
# (pip install apache-sedona pyspark), like the testbed runner does.

project:
  name: ApacheSedona
  language: Python

codebase:
  source_globs:
    - "sedona/python/sedona/**/*.py"
  public_def_regex: "def\\s+([a-zA-Z][A-Za-z0-9_]*)"
  exclude_names: ["main", "__init__"]

files:
  project_profile: configs/project_profile.yaml   # fill via `aideal init`
  prompts_dir: prompts
  original_readme: sedona/README.md               # baseline condition
  llm_readme: docs/LLM_readme.md                  # treatment: `readme --generate`
  notes_to_self: docs/notes_to_self.md
  integration_tasks: configs/integration_tasks.yaml
  aliases: aliases/aliases.json
  error_log: logs/error_log.jsonl

models:
  registry:
    gpt-4o:        { provider: openai,    model: gpt-4o }
    gpt-4o-mini:   { provider: openai,    model: gpt-4o-mini }
    claude-sonnet: { provider: anthropic, model: claude-sonnet-4-6 }
    qwen:          { provider: ollama,    model: qwen3:32b }
    llama3:        { provider: ollama,    model: llama3 }
  roles:
    author: gpt-4o-mini
    audience: gpt-4o

runtime:
  target: local
  local: {}

checks:
  required_sections:
    - "Goal"
    - "Valid Call Patterns|Valid Access Patterns"
    - "LLM Instruction Prompt"
    - "Prompt Snippet"
    - "Common Failure Modes"
    - "Fix Code Hint"
  comprehension_apis_sampled: 5

puzzle:
  cwd: .
  # reuse the testbed's Python puzzle runner pattern; adapt when Sedona source is in
  command: "python ../testbed/runner/puzzle_runner.py --config configs/aideal.yaml --api-doc {llm_readme} --num-puzzles {n} --num-functions {k} --seed {seed}"
  num_puzzles: 5
  num_functions: 4
  seed: 42
  max_fix_rounds: 2
