# AIDEAL config — tslearn (Python, time-series ML, sklearn-style).
# First NON-Scala, NON-geospatial external baseline: tests that the workflow
# generalizes with a config + adapter only (no code edits per repo).
# Both conditions pin tslearn commit f8f13ddf4186e2cc99c8ef495aeb46b1254a01f7.
# Inherits framework defaults + the python adapter (language, def/class regex,
# pytest test mining, docstring-below extraction, python exec command).
extends: [python]

project:
  name: tslearn
  language: Python

codebase:
  # Repo cloned at experiments/tslearn/tslearn (see RUNBOOK step 0), so paths
  # are project-relative and machine-portable.
  source_globs:
    - "tslearn/tslearn/**/*.py"
  test_globs:
    - "tslearn/tests/**/*.py"
  surface_filter: intent_score
  intent:
    threshold: 5
    use_llm: false            # deterministic static selection (same as rdpro restart)
    weights:
      llm_common: 4

files:
  project_profile: configs/project_profile.yaml
  original_readme:
    - tslearn/README.md
    - tslearn/docs
  llm_readme: docs/LLM_readme.md
  notes_to_self: docs/notes_to_self.md
  integration_tasks: configs/integration_tasks.yaml
  aliases: aliases/aliases.json
  error_log: logs/error_log.jsonl

models:
  registry:
    gpt-4o:         { provider: openai, model: gpt-4o }
    gpt-4o-mini:    { provider: openai, model: gpt-4o-mini }
    codex-5.3:      { provider: codex,  model: gpt-5.3-codex }
    gemini-2.5-pro: { provider: google, model: gemini-2.5-pro }
    gemini-3.1-pro: { provider: google, model: gemini-3.1-pro-preview }
  # Match the available model used by the RDPro conditions.
  roles:
    author: gemini-3.1-pro
    audience: gemini-3.1-pro
    fixer: gemini-3.1-pro

comprehension:
  class_context: false
  execute:
    scaffold: docs/api_test_scaffold.py
    # No jars/build; the harness interpreter must have the library:
    #   pip install tslearn        (or: pip install -e tslearn/)
    # Repository-bundled Trace data: deterministic, offline and identical in
    # A1/A2. Small slices keep estimator calls inexpensive.
    local_uris: false
    output_dir: /tmp/aideal_tslearn_out
    preamble: |
      _trace = np.load(trace_npz)
      X = _trace["X_train"][:6, :40, :]  # type: time-series dataset ndarray (6, 40, 1)
      X2 = _trace["X_test"][:4, :32, :]  # type: second dataset ndarray (4, 32, 1)
      s1 = X[0].ravel()  # type: 1-D series ndarray (40,)
      s2 = X[1].ravel()  # type: 1-D series ndarray (40,)
      y = _trace["y_train"][:6]  # type: labels for X, ndarray (6,)
    sample_data:
      trace_npz: tslearn/tslearn/.cached_datasets/Trace.npz
    max_fix_rounds: 3
    require_correctness: true
    io_hints: ""
