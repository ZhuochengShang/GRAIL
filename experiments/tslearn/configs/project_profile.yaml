# Project profile — tslearn. Gates the LLM stages (author persona/context).
# Filled with public facts about the library; refine freely.
project_name: tslearn
domain: >-
  Machine learning on time series (Python): distance measures (DTW, soft-DTW,
  LCSS), clustering (TimeSeriesKMeans, KShape), classification/regression
  (KNeighborsTimeSeries*, shapelets), barycenters, preprocessing, and
  matrix-profile utilities, with a scikit-learn-compatible estimator API.
target_users: >-
  Data scientists and ML engineers who already know numpy/scikit-learn and
  need time-series-specific estimators and metrics; coding agents generating
  analysis pipelines from natural-language task descriptions.
use_cases:
  - Compute DTW (or soft-DTW / LCSS) distances and alignment paths between
    univariate or multivariate series.
  - Cluster a dataset of time series with TimeSeriesKMeans or KShape and
    inspect centroids.
  - Classify labeled series with KNeighborsTimeSeriesClassifier or
    LearningShapelets.
  - Average several series with DTW barycenter averaging.
  - Rescale/normalize series with the preprocessing scalers before modeling.
conventions:
  - Datasets are numpy arrays shaped (n_ts, sz, d); use
    tslearn.utils.to_time_series_dataset to coerce lists of series.
  - Estimators follow the scikit-learn fit/predict/transform contract.
notes: >-
  GRAIL external-baseline study: measures whether the AIDEAL pipeline
  (surface -> intent -> catalog -> comprehension -> fix routing) transfers to
  a Python repo with config only. Keep runs small and deterministic.
