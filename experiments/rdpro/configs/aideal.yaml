# AIDEAL config — RDPro / Beast (Scala + Spark).
# Inherits framework defaults + the scala-spark adapter (language, public_def_regex,
# exclude_names, the generic spark-submit command, fixtures auto-discovery).
# This file holds only what is RDPro-specific.
extends: [scala-spark]

project:
  name: RDPro
  language: Scala

codebase:
  # Relative to this project root (experiments/rdpro) — resolved via cfg.root,
  # so the config is machine-portable (Mac, sandbox, CI).
  source_globs:
    - "beast/**/src/main/scala/**/*.scala"
  # Additional implementation languages searched when doc-fix resolves the
  # receiver/parameter/return type definitions. This is project configuration,
  # not a Scala/Java assumption in the generic tool.
  type_context_globs:
    - "beast/**/src/main/java/**/*.java"
  test_globs:
    - "beast/**/src/test/scala/**/*.scala"
  # NOTE 2026-07-13: the old project override
  #   "^\\s*(?!private\\b|protected\\b).*\\bdef\\s+..."
  # NEVER filtered indented private/protected defs — `\\s*` backtracks one space
  # and the lookahead passes (" protected... "). 142 private/protected names
  # leaked into the 820 surface this way (compress, createRingsForOccupiedPixels,
  # decompress, ...). Visibility now lives in the visibility model (def-line
  # modifiers incl. private[pkg]/protected[pkg] + enclosing-container modifiers),
  # so the adapter's plain regex is correct here.
  # Module-level cleanup: commontest/ is test scaffolding compiled under
  # src/main (copyResource & co) — source-visible but not user API.
  exclude_path_patterns:
    - "(^|/)commontest/"
  surface_filter: intent_score   # filter the surface to intended APIs (else: all)
  intent:
    threshold: 5                 # min evidence score to count an API as user-intended
    # RESTART 2026-07-07: static-only selection so the surface is DETERMINISTIC
    # and matches every recorded number (820 raw -> 205 selected -> 203 catalog
    # entries). With use_llm:true + a key present, llm_common re-judged and
    # drifted the surface to 234 mid-experiment. Flip back to true only for the
    # dedicated llm-arm ablation (aideal intent-compare).
    use_llm: false
    weights:
      llm_common: 4              # weight of the LLM "commonly-used" signal
    # No key / unfilled profile -> degrades to static scoring automatically.

files:
  project_profile: configs/project_profile.yaml
  prompts_dir: prompts            # optional overrides; package defaults used if absent
  # `--doc agents` baseline arm: a HOLISTIC agent guide (how to work in this repo),
  # the industry-standard single file. RDPro's real AGENTS.md is a META one that
  # points at aideal tooling (archived as AGENTS.aideal-meta.md) — not a fair
  # control — so the experiment points at a neutral hand-written guide.
  agents_doc: AGENTS.baseline.md
  original_readme:                # baseline doc(s): a path, or a list of files/dirs/globs
    - beast/README.md
    - beast/doc
  llm_readme: docs/LLM_readme.md
  notes_to_self: docs/notes_to_self.md
  integration_tasks: configs/integration_tasks.yaml
  aliases: aliases/aliases.json
  error_log: logs/error_log.jsonl

models:
  registry:
    gpt-4o:         { provider: openai, model: gpt-4o }
    gpt-4o-mini:    { provider: openai, model: gpt-4o-mini }
    codex-5.3:      { provider: codex,  model: gpt-5.3-codex }
    gemini-2.5-pro: { provider: google, model: gemini-2.5-pro }
    gemini-3.1-pro: { provider: google, model: gemini-3.1-pro-preview }
    gemini-3.2-pro: { provider: google, model: gemini-3.2-pro-preview }
  # DEFAULT CONDITION (2026-07-13, per Zoe): everything on gemini-3.2-pro.
  # Override per run with --role role=provider:model (never needs a yaml edit).
  roles:
    author: gemini-3.2-pro
    audience: gemini-3.2-pro
    fixer: gemini-3.2-pro

runtime:
  target: local
  local: {}

checks:
  required_sections:
    - "Goal"
    - "Valid Call Patterns|Valid Access Patterns"
    - "LLM Instruction Prompt"
    - "Prompt Snippet"
    - "Common Failure Modes"
    - "Fix Code Hint"
  comprehension_apis_sampled: 5

docfix:
  # Geospatial DOMAIN vocabulary is project-level (JTS geometry + tile pixel
  # accessors) — defined HERE, not in tool code. Note the primary allowlist is
  # already the repo's own call vocabulary (docfix.allow_repo_called_members,
  # inherited true), so these sets are a safety margin, not the mechanism.
  allowed_member_categories: [language_core, spark, geometry_common, raster_common]
  member_categories:
    geometry_common: [createPoint, createLineString, createPolygon,
      createMultiPolygon, createGeometryCollection, createLinearRing, setSRID,
      getSRID, getCoordinate, getCoordinates, getEnvelopeInternal, getArea,
      getLength, intersects, contains, covers, within, touches, buffer, union,
      intersection, difference, getX, getY, decode, encode]
    raster_common: [getPixelValueAsFloat, getPixelValueAsDouble,
      getPixelValueAsInt, getPixelValueAsLong]

# Execution-grounded comprehension. The generic scalac -> jar -> spark-submit
# command + fixtures auto-discovery come from the scala-spark adapter; RDPro only
# supplies the build wiring, the geotools packages, and the curated import block
# (auto-derivation over-wildcards and collides on Beast's ambiguous RasterRDD).
comprehension:
  # INDEX-FIRST read path. When true, each tested API's body is prefixed with its
  # catalogue class header (how to obtain the receiver + one verified sibling's real
  # call pattern) instead of the bare per-API body — targets the ~53% receiver /
  # entry-point failure class ("value X is not a member", "not found: value X").
  # Left off so it stays A/B-able; override per run with `--class-context on|off`.
  class_context: false
  execute:
    scaffold: docs/api_test_scaffold.scala     # `aideal scaffold --generate`
    # Per-API isolation: pre-load typed inputs so a comprehension test writes ONLY
    # the API call. `auto` = the author model generates the load code ONCE from the
    # codebase's own documented readers (cached to docs/preamble.scala) — the USER
    # writes no Scala. (A literal Scala block is still accepted if you want to pin it.)
    # PINNED: `auto` grounded on the Java readers (SpatialReader.readInput ->
    # JavaSpatialRDD, geoTiff -> JavaRasterRDD), forcing snippets to invent
    # nonexistent .toRDD/.toRasterRDD adapters. These load at the Scala mixin
    # types raptor/zonal APIs expect: RasterRDD[T]=RDD[ITile[T]], SpatialRDD=RDD[IFeature].
    # Uses ONLY the paths declared in `sample_data` below — no fixtures-folder
    # auto-discovery, no io_hints reader. `raster_tif` + `vector_shapefile` are
    # the sole sources for these two typed inputs.
    preamble: |
      // Pinned: pre-load at the SCALA mixin types the raptor/zonal APIs expect
      // (RasterRDD[T]=RDD[ITile[T]], SpatialRDD=RDD[IFeature]) — NOT the Java readers
      // (JavaRasterRDD/JavaSpatialRDD) that `auto` grounded on, which forced snippets
      // to invent nonexistent .toRDD/.toRasterRDD adapters. Forms verified by passing
      // rows in logs/error_log.jsonl. Change [Float] if this raster is not 32-bit float.
      val rasterRDD: RasterRDD[Float] = sc.geoTiff[Float](raster_tif)
      val featuresRDD: RDD[IFeature] = sc.shapefile(vector_shapefile)
    # Sample inputs auto-discovered from this folder (.tif/.geojson/.csv -> typed):
    fixtures_dir: ../../grail-agent/examples/fixtures
    # ...with explicit per-binding overrides (these win over the fixtures folder):
    sample_data:
      # Boston-region raster so it overlaps the Boston neighborhood polygons
      # (needed for raptorJoin / zonal stats to return non-empty results):
      raster_tif: /Users/clockorangezoe/Documents/phd_projects/code/geoAI/GRAIL/grail-agent/examples/fixtures/nldas_boston_30m.tif
      # Boston neighborhood polygons (.shp) — the vector input the raptor/zonal
      # APIs join against. Pinned so the shapefile (not the auto-discovered
      # geojson) is the vector binding, and it overlaps the raster above:
      vector_shapefile: /Users/clockorangezoe/Documents/phd_projects/code/geoAI/GRAIL/grail-agent/examples/fixtures/Boston_Neighborhood_Boundaries_sample_grail.shp
      # RDPro-owned HDF4 fixture used by HDF4ReaderTest with layer
      # `LST_Day_1km` (pixel 0,0 has the test oracle 15240 / 50.0f).
      # Relative to experiments/rdpro, so it works in every experiment worktree.
      hdf_file: beast/raptor/src/test/resources/rasters/MYD11A1.A2002185.h09v06.006.2015146150958.hdf
    # write outputs to a real, existing project folder (not /tmp):
    output_dir: /Users/clockorangezoe/Documents/phd_projects/code/geoAI/GRAIL/experiments/rdpro/exec_out
    # incremental fix loop: attempts = 1 + max_fix_rounds (each retry sees the
    # prior error + fix hint from error_log). Default 3.
    max_fix_rounds: 3
    # Phase-A correctness gate: a run passes only if the snippet emitted the
    # `__CHECK__` witness from its require(...) assertion — so a wrong pixel type
    # that silently misreads (instead of throwing) is caught, not passed as "ran".
    require_correctness: true
    # I/O cheat-sheet injected into the comprehension prompt (every fix-loop round).
    # DISABLED (empty): `auto` was an LLM guess truncated to the first 12 reader
    # doc entries, so `shapefile` (#27) never made the cut and it always suggested
    # geojson — biasing snippets toward the wrong reader. It's now unnecessary:
    #   (1) the pinned `preamble` deterministically pre-loads every input, so the
    #       model doesn't need to be told how to read them, and
    #   (2) the fix loop already feeds back REAL compile/runtime errors + the fix
    #       that worked (error_log.failures_for), which is execution-grounded and
    #       self-correcting — strictly better than a static guessed cheat-sheet.
    # Set to `auto` or a literal string only if you want hints for APIs the
    # preamble doesn't pre-load.
    io_hints: ""
    # Build wiring: prebuilt dist lib jars (modules) + uber jar (JTS/GeoTools types).
    jars: "beast/target/beast-0.10.1-bin/beast-0.10.1/lib/*.jar"
    uberjar: "target/beast-uber-*.jar"
    build_cwd: beast
    # Runtime deps resolved by Ivy (kept off the shaded uber jar):
    repositories:
      - "https://repo.osgeo.org/repository/geotools-releases/"
      - "https://repo.osgeo.org/repository/release/"
    packages:
      - "org.locationtech.jts:jts-core:1.19.0"
      - "org.geotools:gt-referencing:26.1"
      - "org.geotools:gt-epsg-hsql:26.1"
      - "org.geotools:gt-geotiff:26.1"
      - "org.geotools:gt-coverage:26.1"
      - "it.geosolutions.imageio-ext:imageio-ext-tiff:1.4.14"
      # Generated MVT classes extend protobuf GeneratedMessageV3. Without this,
      # plotAllTiles/saveTiles fail before documentation can be evaluated.
      - "com.google.protobuf:protobuf-java:3.21.12"
    # Curated import block (proven set) — overrides auto-derivation.
    imports: from-tests
    # Must-have imports the test suite never writes explicitly: the RaptorJoin
    # object + its result case classes are used only inside the raptor package,
    # so `from-tests` mining misses them and raptor* API tests fail to resolve.
    extra_imports:
      # JAVA-DEFINED types are invisible to import mining (source_globs only
      # sweep *.scala): Collector/Statistics/IRasterReader live in
      # beast/raptor/src/main/JAVA. zonalStatsLocal failed 3 rounds with
      # "not found: type Collector" on a CORRECT snippet (2026-07-07,
      # run 20260707-064228Z). The package wildcard imports Scala AND Java
      # members; not re-exported by beast._ so the auto-dedup keeps it.
      - "import edu.ucr.cs.bdlab.raptor._"
      # the documented Beast entry point: its package object re-exports every
      # sc.* implicit (shapefile/geojsonFile/readCSVPoint/geoTiff, ...). Pinned so
      # `sc.shapefile` always has a provider regardless of what mining finds.
      # - "import edu.ucr.cs.bdlab.beast._"
      # - "import edu.ucr.cs.bdlab.raptor.RaptorJoin"
      # - "import edu.ucr.cs.bdlab.raptor.RaptorJoinResult"
      # - "import edu.ucr.cs.bdlab.raptor.RaptorJoinResultTile"
      # - "import edu.ucr.cs.bdlab.raptor.RaptorJoinFeature"
    # NOTE: redundant mixin wildcards (e.g. `ReadWriteMixin._`, already re-exported
    # by the `beast._` package object) are now dropped AUTOMATICALLY by
    # generate_scaffold's package-object detection — no manual `exclude_imports`
    # needed. Add one here only to override a case the auto-detector can't see.

puzzle:
  cwd: ../../grail-agent/src
  command: "python -m rdpro_section_codegen.puzzle_eval --api-doc {llm_readme} --num-puzzles {n} --num-functions {k} --seed {seed} --tag exp_rdpro"
  num_puzzles: 5
  num_functions: 5
  seed: 42
  max_fix_rounds: 2
