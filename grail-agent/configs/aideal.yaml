# AIDEAL — single configuration file.
# Controls models, paths, languages, tasks, and run settings.
#
# Layering: AIDEAL is the BACKEND (generic, knows nothing about GRAIL).
# GRAIL is an application on top of it — it supplies the codebase, the docs,
# and the puzzle runner command below.

project:
  name: RDPro
  language: Scala

codebase:
  # globs relative to grail-agent/ (this file's parent's parent)
  source_globs:
    - "../rdpro-backend/RDPro/raptor/src/main/scala/**/*.scala"
  public_def_regex: "def\\s+([a-zA-Z][A-Za-z0-9_]*)"
  exclude_names: ["main", "apply", "unapply", "toString", "equals", "hashCode"]

# The AIDEAL workspace files (find-or-create; paths relative to grail-agent/)
files:
  # user-entered intake: what the project is, target users, domain, use cases.
  # REQUIRED before any LLM step runs (create via `python -m aideal.cli init`).
  project_profile: configs/project_profile.yaml
  # prompt templates (swap the folder for prompt ablations)
  prompts_dir: prompts
  # for this project the existing combined doc IS the LLM readme;
  # on a fresh codebase this would default to docs/LLM_readme.md
  llm_readme: docs/rdpro_api_doc_combined.md
  notes_to_self: docs/notes_to_self.md
  integration_tasks: configs/integration_tasks.yaml
  aliases: aliases/aliases.json
  error_log: logs/error_log.jsonl

models:
  registry:
    gpt-4o:        { provider: openai,    model: gpt-4o }
    gpt-4o-mini:   { provider: openai,    model: gpt-4o-mini }
    claude-sonnet: { provider: anthropic, model: claude-sonnet-4-6 }
    claude-haiku:  { provider: anthropic, model: claude-haiku-4-5 }
    kimi:          { provider: ollama,    model: kimi-k2 }
    qwen:          { provider: ollama,    model: qwen3:32b }
    llama3:        { provider: ollama,    model: llama3 }   # weak/open baseline
  roles:
    author: gpt-4o-mini     # writes README / tests / grades (small is fine)
    audience: gpt-4o        # consumes docs and writes code (the coding agent)

runtime:
  target: local             # local | hpcc | jetstream | cloud
  local:
    python: /Users/clockorangezoe/miniconda3/envs/geo_llm_spark/bin/python
    spark_submit: /Users/clockorangezoe/miniconda3/envs/geo_llm_spark/bin/spark-submit
    env_bin: /Users/clockorangezoe/miniconda3/envs/geo_llm_spark/bin
  hpcc:
    submit: sbatch
    partition: gpu
    account: ""
  jetstream:
    endpoint: ""
  cloud:
    endpoint: ""

checks:
  # form check: each `## API Test:` entry must contain these sections
  required_sections:
    - "Goal"
    - "Valid Call Patterns|Valid Access Patterns"
    - "LLM Instruction Prompt"
    - "Prompt Snippet"
    - "Common Failure Modes"
    - "Fix Code Hint"
  # comprehension = readme unit test: given ONLY the doc entry, the audience
  # model must write correct code, graded by the author model
  comprehension_apis_sampled: 5

puzzle:
  # AIDEAL invokes the application-provided runner; it does not import GRAIL.
  # {llm_readme} {n} {k} {seed} are substituted from this config.
  cwd: src
  command: "python -m rdpro_section_codegen.puzzle_eval --api-doc {llm_readme} --num-puzzles {n} --num-functions {k} --seed {seed} --tag aideal_puzzle"
  num_puzzles: 3
  num_functions: 5
  seed: 42
  max_fix_rounds: 2          # fix loop: rerun failed puzzles with notes_to_self injected
