# Project profile — REQUIRED before the agent reads the code.
# Filled in by the user (or via `python -m aideal.cli init` on a new codebase).
# Every field below is injected into the author/audience prompts so the
# generated documentation and tests match the project's domain and users.

project:
  name: RDPro
  language: Scala
  description: >
    A Spark-based distributed raster processing library (part of UCR Beast)
    for large-scale geospatial analysis: loading GeoTIFFs, per-pixel
    transforms, raster-vector joins, and zonal statistics.

# Who will use the code that LLMs generate against this library?
target_users:
  - geospatial scientists who know Python (rasterio/geopandas) but not Scala/Spark
  - data engineers operating Spark clusters

# Concrete use cases / domain usage the documentation must support.
use_cases:
  - compute NDVI and other band-math products from satellite imagery
  - zonal statistics of land-cover rasters over administrative polygons
  - masking and filtering rasters by vector geometries at scale

domain: geospatial raster analytics (remote sensing, land cover, climate data)

# Hard constraints LLM-generated code must respect.
constraints:
  - never invent file paths; use only provided input variables
  - prefer typed loads (sc.geoTiff[T]) matched to the runtime pixel type
  - outputs must be GeoTIFF or CSV as specified by the task
